name: doctorbike
description: A new Flutter project.

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  intl_phone_field:
    path: intl_phone_field

  cupertino_icons:
  get: ^4.7.2
  get_storage:
  flutter_lints: ^6.0.0
  dartz: ^0.10.1
  flutter_screenutil: ^5.9.3
  firebase_messaging: ^15.2.5
  firebase_core: ^3.13.0
  dio: ^5.8.0+1
  cached_network_image: ^3.4.1
  intl: ^0.20.2
  connectivity_plus: ^6.1.3
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  phone_numbers_parser: ^9.0.3
  email_validator: ^3.0.0
  pin_code_fields: ^8.0.1
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.4
  flutter_local_notifications: ^19.2.0
  photo_view: ^0.15.0
  collection: ^1.19.1
  video_thumbnail: ^0.5.6
  device_preview: ^1.3.1
  flutter_sound: ^9.28.0
  permission_handler: ^12.0.1
  path_provider: ^2.1.5
  audio_waveforms: ^1.3.0
  qr_flutter: ^4.1.0
  qr_code_scanner_plus: ^2.0.10+1
  flutter_cache_manager: ^3.4.1
  http_parser: ^4.1.2

dev_dependencies:
  build_runner:
  freezed: ^3.0.6

  # #to make native splash screen
  # # 1) change path image_path
  # # 2) run commened -> flutter pub run flutter_native_splash:create
  #   flutter_native_splash: ^2.1.1
  # flutter_native_splash:
  #   background_image: assets/image/splash_background.png # choose one color or background
  #   color: "#ffffff"
  #   image: assets/icons/icon.png

  # # to change icon
  # # 1) change path image_path
  # # 2) run commened -> flutter pub run flutter_launcher_icons:main
  #   flutter_launcher_icons: ^0.9.2
  # flutter_icons:
  #   android: true
  #   ios: true
  #   remove_alpha_ios: true
  #   image_path: "assets/icons/icon.png"

  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/icons/
    - assets/images/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai/Almarai-Bold.ttf
        - asset: assets/fonts/Almarai/Almarai-ExtraBold.ttf
        - asset: assets/fonts/Almarai/Almarai-Light.ttf
        - asset: assets/fonts/Almarai/Almarai-Regular.ttf

  uses-material-design: true

flutter_intl:
  enabled: true
